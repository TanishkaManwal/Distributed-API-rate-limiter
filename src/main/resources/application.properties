# noinspection SpringBootApplicationProperties
spring.application.name=ratelimiter
server.port=8080

# ===========================
# Redis Configuration
# ===========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms
spring.data.redis.lettuce.shutdown-timeout=200ms

# ===========================
# Rate Limiter Configuration
# ===========================

# Default Token Bucket Settings
rate.limiter.default.algorithm=TOKEN_BUCKET
rate.limiter.fallback.enabled=true

# Token Bucket - FREE tier
rate.limiter.tier.free.capacity=10
rate.limiter.tier.free.refill-rate=10
rate.limiter.tier.free.refill-interval-seconds=60

# Token Bucket - PRO tier
rate.limiter.tier.pro.capacity=100
rate.limiter.tier.pro.refill-rate=100
rate.limiter.tier.pro.refill-interval-seconds=60

# Token Bucket - PREMIUM tier
rate.limiter.tier.premium.capacity=1000
rate.limiter.tier.premium.refill-rate=1000
rate.limiter.tier.premium.refill-interval-seconds=60

# Endpoint-specific limits (requests per window)
rate.limiter.endpoint.login.limit=5
rate.limiter.endpoint.login.window-seconds=60
rate.limiter.endpoint.login.algorithm=FIXED_WINDOW

rate.limiter.endpoint.search.limit=500
rate.limiter.endpoint.search.window-seconds=60
rate.limiter.endpoint.search.algorithm=SLIDING_WINDOW_LOG

rate.limiter.endpoint.payment.limit=20
rate.limiter.endpoint.payment.window-seconds=60
rate.limiter.endpoint.payment.algorithm=TOKEN_BUCKET

# ===========================
# Actuator / Metrics
# ===========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ===========================
# Logging
# ===========================
logging.level.com.ratelimiter=DEBUG
logging.level.io.lettuce=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n